name: CompanionApp
options:
  bundleIdPrefix: com.urbanindependence
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    GENERATE_INFOPLIST_FILE: NO
targets:
  CompanionApp:
    type: application
    platform: iOS
    sources:
      - CompanionApp
    settings:
      base:
        INFOPLIST_FILE: CompanionApp/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.urbanindependence.companion
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
